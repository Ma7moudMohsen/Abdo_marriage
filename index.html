<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مفاجأة لعبدالرحمن 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    color: #333;
}

.hidden { display: none; }

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover { transform: scale(1.1); }

#envelope {
    width: 220px;
    height: 140px;
    background: #fff;
    margin: 60px auto;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
}

#flap {
    position: absolute;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-bottom: 70px solid #ff4d6d;
    top: 0;
    width: 0;
    height: 0;
    transform-origin: top;
    transition: transform 1s;
}

.open #flap { transform: rotateX(180deg); }

#message {
    font-size: 22px;
    width: 80%;
    margin: auto;
    min-height: 120px;
}

#date {
    margin-top: 10px;
    font-weight: bold;
}

#surprise {
    margin-top: 20px;
}

/* 🔥 صورة Fade-in */
#friendImage {
    width: 260px;
    border-radius: 15px;
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.9);
    transition: all 1.5s ease;
}

#friendImage.show {
    opacity: 1;
    transform: scale(1);
}

.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: red;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="start">
    <h2>يا مهندس عبدالرحمن 😏</h2>
    <p>في حاجة صغيرة ليك… بس افتحها لوحدك 👀</p>
    <button onclick="nextStep()">اضغط هنا</button>
</div>

<div id="envelopeSection" class="hidden">
    <h3>افتح الظرف ✉️</h3>
    <div id="envelope" onclick="openEnvelope()">
        <div id="flap"></div>
    </div>
</div>

<div id="messageSection" class="hidden">
    <div id="message"></div>
    <div id="date"></div>

    <div id="surprise" class="hidden">
        <h3>استنى… لسه في حاجة 😏</h3>
        <p>أنا بعتلك النقطة على إنستا باي… لا ترد ولا تستبدل 😂</p>

        <!-- 🔥 الصورة -->
        <img id="friendImage" src="image.jpg">
    </div>
</div>

<!-- 🔊 الصوت -->
<audio id="zaghrouta" src="zaghrouta.mp3"></audio>

<script>
function nextStep() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("envelopeSection").classList.remove("hidden");
}

function openEnvelope() {
    document.getElementById("envelope").classList.add("open");

    setTimeout(() => {
        document.getElementById("envelopeSection").classList.add("hidden");
        document.getElementById("messageSection").classList.remove("hidden");

        typeMessage();
        document.getElementById("zaghrouta").play().catch(()=>{});
        startConfetti();
    }, 1000);
}

let text = "ألف مبروك يا مهندس عبدالرحمن ❤️\nربنا يتمم لك على خير ويجمع بينكم في خير 🤲\nويجعل حياتكم كلها سعادة وراحة بال 💍✨\nوعقبال ما نشوفك أسعد واحد في الدنيا دايمًا";

let i = 0;
function typeMessage() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i).replace("\n","<br>");
        i++;
        setTimeout(typeMessage, 40);
    } else {
        document.getElementById("date").innerHTML = "📅 23 / 3 / 2026";

        setTimeout(() => {
            document.getElementById("surprise").classList.remove("hidden");

            // 🔥 تشغيل fade-in للصورة
            setTimeout(()=>{
                document.getElementById("friendImage").classList.add("show");
            }, 300);

        }, 1500);
    }
}

function startConfetti() {
    for (let i = 0; i < 150; i++) {
        let c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
